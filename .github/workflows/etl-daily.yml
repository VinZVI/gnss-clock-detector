name: Daily ETL

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily
  workflow_dispatch:      # manual trigger

jobs:
  etl:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Install dependencies
        run: uv pip install -e .
      
      - name: Run ETL
        run: python -m gnss_clock.etl --source ftp --days 1
        env:
          GNSS_DATA_SOURCE: ftp
          GNSS_DB_PATH: ./db.sqlite3
          GNSS_ETL_RETAIN_DAYS: 14
          GNSS_MAD_THRESHOLD: 3.0
          FLASK_DEBUG: 0
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          
          # NASA credentials (if using NASA source)
          # NASA_EARTHDATA_USER: ${{ secrets.NASA_USER }}
          # NASA_EARTHDATA_PASS: ${{ secrets.NASA_PASS }}
      
      - name: Commit and push database changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add db.sqlite3
          git diff --cached --quiet || git commit -m "chore: update database $(date +%Y-%m-%d)"
          git push
        env:
          GIT_ASKPASS: /bin/echo
